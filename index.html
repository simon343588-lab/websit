<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteAudit AI</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2EC;
    --ink: #0F0F0F;
    --accent: #E8FF00;
    --muted: #888;
    --card: #FFFFFF;
    --border: #E0DDD6;
    --green: #00C853;
    --yellow: #FFB300;
    --red: #FF3B00;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--ink); font-family: 'Outfit', sans-serif; min-height: 100vh; }
  .wrap { position: relative; }
  header { padding: 28px 40px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--ink); }
  .logo { font-family: 'Bebas Neue'; font-size: 26px; letter-spacing: 2px; }
  .logo-badge { background: var(--ink); color: var(--accent); padding: 3px 10px; margin-left: 6px; }
  .hero { padding: 60px 20px; text-align: center; }
  .hero h1 { font-family: 'Bebas Neue'; font-size: 64px; }
  .input-card { max-width: 600px; margin: auto; }
  .input-box { border: 2px solid var(--ink); border-radius: 12px; background: white; }
  input { width: 100%; padding: 14px; border: none; outline: none; }
  .audit-btn { width: 100%; padding: 16px; background: var(--ink); color: var(--accent); border: none; cursor: pointer; }
  .error-msg { display:none; color:red; padding:10px; }
  .error-msg.show { display:block; }
  #results { padding:20px; }
</style>
</head>
<body>

<div class="wrap">

<header>
  <div class="logo">SiteAudit <span class="logo-badge">AI</span></div>
</header>

<div class="hero">
  <h1>YOUR SITE BRUTALLY AUDITED</h1>
</div>

<div class="input-card">
  <div class="input-box">
    <input type="text" id="siteUrl" placeholder="Enter website URL"/>
    <button class="audit-btn" id="auditBtn" onclick="runAudit()">Analyze Website</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<div id="results"></div>

</div>

<script>
async function runAudit() {
  const urlInput = document.getElementById('siteUrl').value.trim();
  const errEl = document.getElementById('errorMsg');
  const resultsEl = document.getElementById('results');

  errEl.className = 'error-msg';
  resultsEl.innerHTML = '';

  if (!urlInput) {
    errEl.textContent = 'Enter a URL';
    errEl.className = 'error-msg show';
    return;
  }

  let url = urlInput;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  const API_KEY = 'AIzaSyCYaweJSr-A-_Bf33xPTGM6Rcu371aN7wE';

  const prompt = `Audit this website: ${url}
Return JSON with scores, issues, wins.`;

  try {
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 15000);

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.0-flash:generateContent?key=${API_KEY}`,
      {
        method: 'POST',
        signal: controller.signal,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          tools: [{ googleSearch: {} }],
          generationConfig: {
            responseMimeType: "application/json"
          }
        })
      }
    );

    const data = await res.json();

    if (data.error) throw new Error(data.error.message);

    const text = data.candidates[0].content.parts[0].text;
    const audit = JSON.parse(text);

    resultsEl.innerHTML = `
      <h2>Score: ${audit.overallScore}</h2>
      <p>${audit.verdict}</p>
      <h3>Wins</h3>
      <ul>${(audit.wins||[]).map(w => `<li>${w}</li>`).join('')}</ul>
      <h3>Issues</h3>
      <ul>${(audit.issues||[]).map(i => `<li>${i.title} - ${i.detail}</li>`).join('')}</ul>
    `;

  } catch (err) {
    errEl.textContent = err.name === 'AbortError'
      ? 'Request timeout'
      : err.message;
    errEl.className = 'error-msg show';
  }
}
</script>

</body>
</html>
