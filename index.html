<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Flashcard Generator (No API)</title>
<style>
body{font-family:Arial, sans-serif;background:#f5f5f5;margin:0;padding:20px}
.container{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:10px}
textarea{width:100%;height:150px;margin-bottom:10px}
button{padding:10px;margin:5px 0;width:100%}
.card{border:1px solid #ddd;padding:20px;margin-top:20px;text-align:center;cursor:pointer}
.hidden{display:none}
.stats{display:flex;justify-content:space-between;margin-top:10px}
</style>
</head>
<body><div class="container" id="inputArea">
<h2>Advanced Flashcard Generator</h2>
<textarea id="text"></textarea>
<button onclick="generate()">Generate</button>
</div><div class="container hidden" id="studyArea">
<div class="stats">
<span id="progress"></span>
<button onclick="reset()">Reset</button>
</div>
<div class="card" onclick="flip()">
<div id="front"></div>
<div id="back" class="hidden"></div>
</div>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div><script>
let deck=[];let i=0;let flipped=false;

function generate(){
let text=document.getElementById('text').value;
let sentences=text.split(/[.!?]/);
let freq={};

// word frequency
sentences.forEach(s=>{
let words=s.toLowerCase().match(/\b[a-z]{4,}\b/g)||[];
words.forEach(w=>freq[w]=(freq[w]||0)+1);
});

// scoring
sentences.forEach(s=>{
let words=s.match(/\b[a-zA-Z]{4,}\b/g)||[];
if(words.length<3)return;

let best=words.sort((a,b)=>(freq[b.toLowerCase()]||0)-(freq[a.toLowerCase()]||0))[0];
if(!best)return;

let front=s.replace(best,'_____');

// Q/A type
if(s.toLowerCase().includes('is')){
let parts=s.split(' is ');
if(parts.length===2){
 deck.push({front:'What is '+parts[0]+'?',back:parts[1]});
}
}

// Cloze type
 deck.push({front:front,back:best});
});

// deduplicate
let seen=new Set();
deck=deck.filter(c=>{
let key=c.front+c.back;
if(seen.has(key))return false;
seen.add(key);
return true;
});

// shuffle
deck.sort(()=>Math.random()-0.5);

if(deck.length===0){alert('No cards');return}

localStorage.setItem('deck',JSON.stringify(deck));

document.getElementById('inputArea').classList.add('hidden');
document.getElementById('studyArea').classList.remove('hidden');
i=0;render();
}

function render(){
flipped=false;
document.getElementById('front').textContent=deck[i].front;
document.getElementById('back').textContent=deck[i].back;
document.getElementById('back').classList.add('hidden');
document.getElementById('progress').textContent=`${i+1}/${deck.length}`;
}

function flip(){
flipped=!flipped;
document.getElementById('back').classList.toggle('hidden',!flipped);
}

function next(){if(i<deck.length-1){i++;render()}}
function prev(){if(i>0){i--;render()}}

function reset(){
localStorage.removeItem('deck');
location.reload();
}

// load saved
window.onload=()=>{
let saved=localStorage.getItem('deck');
if(saved){deck=JSON.parse(saved);
document.getElementById('inputArea').classList.add('hidden');
document.getElementById('studyArea').classList.remove('hidden');
render();}
}
</script></body>
</html>
